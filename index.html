<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="54min：轻量工具集合。">
  <title>54min</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%9A%80%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5f0;
      --text: #171717;
      --muted: #68635d;
      --card: rgba(255, 255, 255, 0.78);
      --card-strong: #ffffff;
      --line: rgba(23, 23, 23, 0.1);
      --accent: #1d4ed8;
      --accent-strong: #123a9f;
      --shadow: 0 24px 80px rgba(38, 34, 28, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(249, 115, 22, 0.16), transparent 30%),
        radial-gradient(circle at 84% 8%, rgba(29, 78, 216, 0.16), transparent 28%),
        linear-gradient(135deg, #fffdf7 0%, var(--bg) 44%, #eef4ff 100%);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 3px solid rgba(29, 78, 216, 0.45);
      outline-offset: 4px;
      border-radius: 14px;
    }

    .page {
      display: flex;
      width: min(1120px, calc(100% - 40px));
      min-height: 100vh;
      flex-direction: column;
      margin: 0 auto;
      padding: 32px 0 24px;
    }

    main {
      flex: 1;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand-mark {
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border-radius: 14px;
      background: #171717;
      color: #fff;
      box-shadow: 0 12px 30px rgba(23, 23, 23, 0.18);
      font-size: 14px;
    }

    .apps {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      display: flex;
      min-height: 300px;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.7), transparent 42%);
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .card.insightap {
      background: linear-gradient(160deg, rgba(239, 246, 255, 0.92), rgba(255, 255, 255, 0.74));
    }

    .card.easyposter {
      background: linear-gradient(160deg, rgba(255, 247, 237, 0.94), rgba(255, 255, 255, 0.76));
    }

    .card.future {
      background: linear-gradient(160deg, rgba(245, 245, 245, 0.96), rgba(255, 255, 255, 0.7));
    }

    .app-icon {
      display: grid;
      width: 58px;
      height: 58px;
      place-items: center;
      border-radius: 20px;
      background: #fff;
      font-size: 28px;
      box-shadow: 0 16px 32px rgba(23, 23, 23, 0.1);
    }

    .card h3 {
      margin: 6px 0 0;
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .card p {
      margin: 0;
      color: var(--muted);
    }

    .feature-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      color: #34302b;
      font-size: 14px;
      list-style: none;
    }

    .feature-list li {
      display: flex;
      gap: 8px;
    }

    .feature-list li::before {
      content: "•";
      color: var(--accent);
      font-weight: 900;
    }

    .text-link {
      display: inline-flex;
      width: fit-content;
      min-height: 42px;
      align-items: center;
      margin-top: auto;
      color: var(--accent-strong);
      font-weight: 800;
    }

    footer {
      margin-top: 40px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .apps {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: auto;
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 28px, 1120px);
        padding-top: 24px;
      }

      .nav {
        margin-bottom: 28px;
      }

      .card {
        padding: 22px;
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="nav" aria-label="站点导航">
      <a class="brand" href="/sites/" aria-label="54min 首页">
        <span class="brand-mark">54</span>
        <span>54min</span>
      </a>
    </header>

    <main>
      <section aria-label="应用列表">
        <div class="apps">
          <article class="card insightap">
            <span class="app-icon" aria-hidden="true">✨</span>
            <h3>Insightap</h3>
            <p>AI 阅读助手，一键提取网页内容重点。</p>
            <ul class="feature-list">
              <li>支持 X、YouTube、微信公众号等内容</li>
              <li>生成结构化摘要和关键洞察</li>
              <li>支持继续追问和深入理解</li>
            </ul>
            <a class="text-link" href="https://chromewebstore.google.com/search/insightap" target="_blank" rel="noreferrer">Chrome Web Store</a>
          </article>

          <article class="card easyposter">
            <span class="app-icon" aria-hidden="true">📝</span>
            <h3>EasyPoster</h3>
            <p>快速生成适合社交媒体发布的图文卡片。</p>
            <ul class="feature-list">
              <li>轻量生成海报和内容卡片</li>
              <li>适合小红书等图文发布场景</li>
              <li>减少排版和设计工具成本</li>
            </ul>
            <a class="text-link" href="/sites/easyposter/" target="_blank" rel="noreferrer">Open EasyPoster</a>
          </article>

          <article class="card future">
            <span class="app-icon" aria-hidden="true">…</span>
            <h3>Coming soon</h3>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <span>© 2026</span>
    </footer>
  </div>
</body>
</html>
